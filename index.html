<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo&family=Orbitron&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    document.title = "blockT"
    </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050505;
      font-family: "Heebo", sans-serif;
      color: white;
      user-select: none;
      touch-action: none;
    }
    canvas {
      display: block;
    }
    .retro-font {
      font-family: "Orbitron", sans-serif;
    }
    .neon-text {
      text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
    }
    .neon-border {
      border: 2px solid #00f2ff;
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
    }
    .glass-panel {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 242, 255, 0.3);
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .interactive {
      pointer-events: auto;
    }
    .shake {
      animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
  </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
      <div
        id="start-screen"
        class="glass-panel p-8 rounded-2xl text-center interactive max-w-md"
      >
        <h1 class="retro-font text-5xl font-bold mb-4 neon-text text-cyan-400">
          blockT
        </h1>
        <p class="text-lg mb-6 text-gray-300">
        נסו לשרוד כמה שיותר זמן!
        </p>
        <a class="text-lg mb-6 text-gray-300" href="https://www.tiktok.com/@robloxmlml9">
          שיתוף פעולה - איך לעשות דברים מגניבים במחשב
        </a>
        <div class="mb-6 grid grid-cols-2 gap-4 text-sm">
          <div class="p-2 border border-cyan-900 rounded">
            מחשב - חצים
          </div>
          <div class="p-2 border border-cyan-900 rounded">
            טלפון - מגע וגרירה
          </div>
        </div>
        <button
          id="start-btn"
          class="retro-font bg-cyan-500 hover:bg-cyan-400 text-black px-10 py-3 rounded-full font-bold text-xl transition-all transform hover:scale-105 neon-border"
        >
          התחל משחק
        </button>
      </div>

      <div
        id="hud"
        class="absolute top-0 left-0 w-full p-6 flex justify-between items-start hidden"
      >
        <div class="text-right">
          <div class="text-xs text-cyan-400 uppercase tracking-widest">
            ניקוד
          </div>
          <div id="score-val" class="retro-font text-3xl">0</div>
        </div>
        <div class="text-center">
          <div
            id="shield-indicator"
            class="hidden px-3 py-1 bg-blue-500 rounded-full text-xs font-bold animate-pulse"
          >
            מגן פעיל!
          </div>
        </div>
        <div class="text-left">
          <div class="text-xs text-pink-500 uppercase tracking-widest">שיא</div>
          <div id="high-score-val" class="retro-font text-3xl">0</div>
        </div>
      </div>

      <div
        id="game-over-screen"
        class="glass-panel p-8 rounded-2xl text-center interactive max-w-md hidden"
      >
        <h2 class="retro-font text-4xl font-bold mb-2 text-pink-500">
          GAME OVER
        </h2>
        <p id="final-score-text" class="text-xl mb-6">הניקוד שלך: 0</p>
                <a class="text-lg mb-6 text-gray-300" href="https://www.tiktok.com/@robloxmlml9">
          שיתוף פעולה - איך לעשות דברים מגניבים במחשב
        </a>
        <button
          id="restart-btn"
          class="retro-font bg-white text-black px-10 py-3 rounded-full font-bold text-xl transition-all transform hover:scale-105 mb-4"
        >
          נסה שוב
        </button>
      </div>
    </div>
    <script>
       const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const startScreen = document.getElementById("start-screen");
      const gameOverScreen = document.getElementById("game-over-screen");
      const hud = document.getElementById("hud");
      const scoreVal = document.getElementById("score-val");
      const highScoreVal = document.getElementById("high-score-val");
      const finalScoreText = document.getElementById("final-score-text");
      const shieldIndicator = document.getElementById("shield-indicator");

      let width, height;
      let animationId;
      let gameState = "START";
      let score = 0;
      let highScore = localStorage.getItem("neon_odyssey_highscore") || 0;
      highScoreVal.innerText = highScore;

      let player;
      let obstacles = [];
      let particles = [];
      let powerUps = [];
      let frameCount = 0;
      let gameSpeed = 5;
      let speedLevel = 0;
      const keys = {};
      let touchX = null;
      let touchY = null;

      class Player {
        constructor() {
          this.width = 40;
          this.height = 40;
          this.x = width / 2;
          this.y = height * 0.8;
          this.speed = 7;
          this.color = "#00f2ff";
          this.shield = false;
          this.shieldTime = 0;
          this.targetX = this.x;
          this.targetY = this.y;
        }

        update() {
          if (keys["ArrowLeft"] || keys["a"]) this.x -= this.speed;
          if (keys["ArrowRight"] || keys["d"]) this.x += this.speed;
          if (keys["ArrowUp"] || keys["w"]) this.y -= this.speed;
          if (keys["ArrowDown"] || keys["s"]) this.y += this.speed;

          if (touchX !== null) {
            let dx = touchX - this.x;
            let dy = touchY - this.y;
            this.x += dx * 0.15;
            this.y += dy * 0.15;
          }

          this.x = Math.max(
            this.width / 2,
            Math.min(width - this.width / 2, this.x)
          );
          this.y = Math.max(
            this.height / 2,
            Math.min(height - this.height / 2, this.y)
          );

          if (this.shield) {
            this.shieldTime--;
            if (this.shieldTime <= 0) {
              this.shield = false;
              shieldIndicator.classList.add("hidden");
            }
          }
        }

        draw() {
          ctx.save();

          ctx.shadowBlur = 15;
          ctx.shadowColor = this.color;

          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.moveTo(this.x, this.y - 25);
          ctx.lineTo(this.x - 20, this.y + 15);
          ctx.lineTo(this.x + 20, this.y + 15);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
          ctx.fill();

          if (this.shield) {
            ctx.strokeStyle = "#3b82f6";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 45, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = "rgba(59, 130, 246, 0.2)";
            ctx.fill();
          }

          ctx.restore();
        }
      }

      class Obstacle {
        constructor() {
          this.size = Math.random() * 40 + 20;
          this.x = Math.random() * (width - this.size);
          this.y = -this.size;
          this.speed = Math.random() * 2 + gameSpeed;
          this.color = "#ff0055";
          this.rotation = 0;
          this.rotationSpeed = (Math.random() - 0.5) * 0.1;
        }

        update() {
          this.y += this.speed;
          this.rotation += this.rotationSpeed;
        }

        draw() {
          ctx.save();
          ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
          ctx.rotate(this.rotation);

          ctx.shadowBlur = 10;
          ctx.shadowColor = this.color;
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 2;

          ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
          ctx.fillStyle = "rgba(255, 0, 85, 0.1)";
          ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);

          ctx.restore();
        }
      }

      class PowerUp {
        constructor() {
          this.size = 25;
          this.x = Math.random() * (width - this.size);
          this.y = -this.size;
          this.speed = gameSpeed * 0.8;
          this.type = Math.random() > 0.5 ? "SHIELD" : "POINTS";
        }

        update() {
          this.y += this.speed;
        }

        draw() {
          ctx.save();
          ctx.shadowBlur = 15;
          ctx.shadowColor = this.type === "SHIELD" ? "#3b82f6" : "#facc15";
          ctx.fillStyle = this.type === "SHIELD" ? "#3b82f6" : "#facc15";

          ctx.beginPath();
          ctx.arc(this.x, this.y, 12, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#000";
          ctx.font = "bold 12px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(this.type === "SHIELD" ? "S" : "+", this.x, this.y);

          ctx.restore();
        }
      }

      class Particle {
        constructor(x, y, color) {
          this.x = x;
          this.y = y;
          this.color = color;
          this.size = Math.random() * 3 + 1;
          this.speedX = (Math.random() - 0.5) * 10;
          this.speedY = (Math.random() - 0.5) * 10;
          this.life = 1;
          this.decay = Math.random() * 0.02 + 0.01;
        }

        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          this.life -= this.decay;
        }

        draw() {
          ctx.globalAlpha = this.life;
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function init() {
  resize();
  player = new Player();
  obstacles = [];
  particles = [];
  powerUps = [];
  score = 0;
  gameSpeed = 5;
  speedLevel = 0;
  frameCount = 0;
  gameState = "PLAYING";
        scoreVal.innerText = score;
        startScreen.classList.add("hidden");
        gameOverScreen.classList.add("hidden");
        hud.classList.remove("hidden");

        if (animationId) cancelAnimationFrame(animationId);
        animate();
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function animate() {
        if (gameState !== "PLAYING") return;

        ctx.fillStyle = "rgba(5, 5, 5, 0.2)";
        ctx.fillRect(0, 0, width, height);

        frameCount++;

        let currentLevel = Math.floor(score / 500);

if (currentLevel > speedLevel) {
  gameSpeed *= 1.2;
  speedLevel = currentLevel;
}

        if (frameCount % Math.max(5, Math.floor(40 - gameSpeed)) === 0) {
          obstacles.push(new Obstacle());
        }

        if (frameCount % 400 === 0) {
          powerUps.push(new PowerUp());
        }

        player.update();
        player.draw();

        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].update();
          obstacles[i].draw();

          const dx = player.x - (obstacles[i].x + obstacles[i].size / 2);
          const dy = player.y - (obstacles[i].y + obstacles[i].size / 2);
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < player.width / 2 + obstacles[i].size / 2 - 5) {
            if (player.shield) {
              createExplosion(
                obstacles[i].x,
                obstacles[i].y,
                obstacles[i].color
              );
              obstacles.splice(i, 1);
              player.shield = false;
              shieldIndicator.classList.add("hidden");
              score += 50;
            } else {
              gameOver();
            }
            continue;
          }

          if (obstacles[i].y > height) {
            obstacles.splice(i, 1);
            score += 10;
            scoreVal.innerText = score;
          }
        }

        for (let i = powerUps.length - 1; i >= 0; i--) {
          powerUps[i].update();
          powerUps[i].draw();

          const dx = player.x - powerUps[i].x;
          const dy = player.y - powerUps[i].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 30) {
            if (powerUps[i].type === "SHIELD") {
              player.shield = true;
              player.shieldTime = 400;
              shieldIndicator.classList.remove("hidden");
            } else {
              score += 500;
              scoreVal.innerText = score;
            }
            createExplosion(powerUps[i].x, powerUps[i].y, "#fff");
            powerUps.splice(i, 1);
          } else if (powerUps[i].y > height) {
            powerUps.splice(i, 1);
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw();
          if (particles[i].life <= 0) particles.splice(i, 1);
        }

        if (Math.random() > 0.8) {
          particles.push(new Particle(Math.random() * width, 0, "#333"));
        }

        animationId = requestAnimationFrame(animate);
      }

      function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
          particles.push(new Particle(x, y, color));
        }
      }

      function gameOver() {
        gameState = "GAMEOVER";
        createExplosion(player.x, player.y, player.color);

        document.body.classList.add("shake");
        setTimeout(() => document.body.classList.remove("shake"), 500);

        if (score > highScore) {
          highScore = score;
          localStorage.setItem("neon_odyssey_highscore", highScore);
          highScoreVal.innerText = highScore;
        }

        finalScoreText.innerText = `הניקוד שלך: ${score}`;
        gameOverScreen.classList.remove("hidden");
        hud.classList.add("hidden");
      }

      window.addEventListener("resize", resize);

      window.addEventListener("keydown", (e) => (keys[e.key] = true));
      window.addEventListener("keyup", (e) => (keys[e.key] = false));

      canvas.addEventListener("touchstart", (e) => {
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
      });
      canvas.addEventListener(
        "touchmove",
        (e) => {
          touchX = e.touches[0].clientX;
          touchY = e.touches[0].clientY;
          e.preventDefault();
        },
        { passive: false }
      );
      canvas.addEventListener("touchend", () => {
        touchX = null;
        touchY = null;
      });

      document.getElementById("start-btn").addEventListener("click", init);
      document.getElementById("restart-btn").addEventListener("click", init);

      resize();

      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, width, height);
    </script>
    <script>
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (gameState === "PLAYING") {
      pauseGame();
    }
  }
});

function pauseGame() {
  gameState = "PAUSED";
  if (animationId) cancelAnimationFrame(animationId);
  
  hud.classList.add("hidden");
  startScreen.classList.remove("hidden");
  
  startScreen.querySelector("p").innerText = "לחץ על התחל משחק כדי להתחיל משחק חדש.";
}
    </script>
  </body>

</html>
